<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago Seguro - VM Tecnología</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://js.openpay.mx/openpay.v1.min.js"></script>
  <script src="https://js.openpay.mx/openpay-data.v1.min.js"></script>
</head>
<body style="background:#f5f5f5; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:Arial, sans-serif;">

<div style="max-width:460px; width:100%; margin:auto; padding:24px; border:1px solid #ddd; border-radius:12px; background:#fff;">

  <!-- Encabezado -->
  <div style="text-align:center; margin-bottom:20px;">
    <h3 style="color:#004481; margin:0 0 6px;">🔒 Pago Seguro</h3>
    <p style="font-size:13px; color:#666; margin:0 0 8px;">Procesado por</p>
    <div style="display:inline-flex; align-items:center; padding:5px 14px; border:2px solid #ddd; border-radius:8px; background:white;">
      <img src="https://raw.githubusercontent.com/betoesses1/Formulario-Pago/main/LogotipoOpenpay-01.jpg" style="height:22px; width:auto;" alt="Openpay">
    </div>
  </div>

  <!-- Logos marcas oficiales Openpay -->
  <div style="display:flex; justify-content:center; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:18px; padding:10px; background:#f9f9f9; border-radius:8px;">
    <span style="font-size:11px; color:#888; width:100%; text-align:center; margin-bottom:6px;">Métodos de pago aceptados:</span>
    <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; width:64px; height:40px; display:flex; align-items:center; justify-content:center; padding:4px;">
      <img src="https://raw.githubusercontent.com/betoesses1/Formulario-Pago/main/visa.png" style="max-height:28px; max-width:56px; object-fit:contain;" alt="Visa">
    </div>
    <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; width:64px; height:40px; display:flex; align-items:center; justify-content:center; padding:4px;">
      <img src="https://raw.githubusercontent.com/betoesses1/Formulario-Pago/main/masterCard.png" style="max-height:28px; max-width:56px; object-fit:contain;" alt="Mastercard">
    </div>
    <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; width:64px; height:40px; display:flex; align-items:center; justify-content:center; padding:4px;">
      <img src="https://raw.githubusercontent.com/betoesses1/Formulario-Pago/main/americanExpress.png" style="max-height:28px; max-width:56px; object-fit:contain;" alt="American Express">
    </div>
    <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; width:64px; height:40px; display:flex; align-items:center; justify-content:center; padding:4px;">
      <img src="https://raw.githubusercontent.com/betoesses1/Formulario-Pago/main/carnet.png" style="max-height:28px; max-width:56px; object-fit:contain;" alt="Carnet">
    </div>
    <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; width:64px; height:40px; display:flex; align-items:center; justify-content:center; padding:4px;">
      <img src="https://raw.githubusercontent.com/betoesses1/Formulario-Pago/main/spei.png" style="max-height:28px; max-width:56px; object-fit:contain;" alt="SPEI">
    </div>
  </div>

  <!-- Formulario -->
  <form id="payment-form">
    <input type="hidden" name="token_id" id="token_id">
    <input type="hidden" name="device_session_id" id="device_session_id">
    <input type="hidden" name="use_3d_secure" value="true">
    <input type="hidden" name="redirect_url" value="https://www.tiendasvm.com.mx/inicio/confirmacion">

    <div style="margin-bottom:12px;">
      <label style="font-size:13px; font-weight:bold; color:#333;">Nombre del titular</label><br>
      <input type="text" data-openpay-card="holder_name"
             style="width:100%; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; font-size:14px; margin-top:4px;"
             placeholder="Como aparece en la tarjeta">
    </div>

    <div style="margin-bottom:12px;">
      <label style="font-size:13px; font-weight:bold; color:#333;">Número de tarjeta</label><br>
      <input type="text" data-openpay-card="card_number"
             style="width:100%; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; font-size:14px; margin-top:4px;"
             placeholder="1234 5678 9012 3456" maxlength="16">
    </div>

    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <div style="flex:1;">
        <label style="font-size:13px; font-weight:bold; color:#333;">Mes</label><br>
        <input type="text" data-openpay-card="expiration_month" placeholder="MM" maxlength="2"
               style="width:100%; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; font-size:14px; margin-top:4px;">
      </div>
      <div style="flex:1;">
        <label style="font-size:13px; font-weight:bold; color:#333;">Año</label><br>
        <input type="text" data-openpay-card="expiration_year" placeholder="AA" maxlength="2"
               style="width:100%; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; font-size:14px; margin-top:4px;">
      </div>
      <div style="flex:1;">
        <label style="font-size:13px; font-weight:bold; color:#333;">CVV</label><br>
        <input type="text" data-openpay-card="cvv2" placeholder="123" maxlength="4"
               style="width:100%; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; font-size:14px; margin-top:4px;">
      </div>
    </div>

    <!-- Aviso 3D Secure -->
    <div style="background:#e8f4fd; border:1px solid #b3d7f0; border-radius:6px; padding:10px; margin-bottom:14px; font-size:12px; color:#004481; display:flex; align-items:center; gap:8px;">
      🔐 <span>Tu banco verificará esta compra con <strong>3D Secure</strong> para mayor seguridad.</span>
    </div>

    <!-- Error -->
    <div id="error-msg" style="display:none; background:#fff0f0; border:1px solid #ffcccc; color:#cc0000; border-radius:6px; padding:10px; margin-bottom:12px; font-size:13px;"></div>

    <button type="submit" id="pay-button"
            style="width:100%; background:#004481; color:white; padding:14px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px;">
      🔒 PAGAR AHORA
    </button>
  </form>

  <div style="text-align:center; margin-top:16px; font-size:11px; color:#999;">
    <p style="margin:4px 0;">🔒 Conexión segura SSL · Tus datos están protegidos</p>
    <p style="margin:4px 0;">Al pagar aceptas nuestros <a href="https://www.tiendasvm.com.mx/inicio/términos-condiciones-y-privacidad" style="color:#004481;">Términos y Condiciones</a></p>
  </div>
</div>

<script type="text/javascript">
$(document).ready(function() {

  OpenPay.setId('mcu1a7seu2rgu8lpnwes');
  OpenPay.setApiKey('pk_24ea7677c1384ad4b148a39fcb0ce0cb');
  OpenPay.setSandboxMode(true);

  OpenPay.deviceData.setup("payment-form", "device_session_id");

  var mensajesError = {
    '1001': 'Ingrese sus datos correctamente e inténtelo de nuevo.',
    '1004': 'Error de pago, comuníquese con su banco e inténtelo de nuevo.',
    '1005': 'Error de pago, comuníquese con su banco e inténtelo de nuevo.',
    '2002': 'Tarjeta rechazada. Ingrese sus datos correctamente e inténtelo de nuevo.',
    '2003': 'Tarjeta rechazada. Comuníquese con su banco e ingrese sus datos correctamente.',
    '2004': 'Consulte el saldo de su tarjeta e inténtelo más tarde.',
    '2007': 'Tarjeta rechazada. Ingrese sus datos correctamente e inténtelo de nuevo.',
    '2008': 'Tarjeta rechazada. Comuníquese con su banco e ingrese sus datos correctamente.',
    '2009': 'Ingrese sus datos correctamente e inténtelo de nuevo.',
    '2010': 'Transacción fallida. Comuníquese con su banco e ingrese sus datos correctamente.',
    '3001': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    '3002': 'Consulte el saldo de su tarjeta e inténtelo más tarde.',
    '3003': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    '3004': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    '3005': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    '3006': 'Transacción fallida. Comuníquese con su banco e ingrese sus datos correctamente.',
    '3009': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    '3010': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    '3011': 'Tarjeta rechazada. Comuníquese con su banco e inténtelo de nuevo.',
    'default': 'Transacción fallida. Comuníquese con su banco e ingrese sus datos correctamente.'
  };

  function obtenerMensaje(codigo) {
    return mensajesError[String(codigo)] || mensajesError['default'];
  }

  $('#payment-form').on('submit', function(e) {
    e.preventDefault();
    $('#error-msg').hide();
    $('#pay-button').prop('disabled', true).text('⏳ Procesando...');
    OpenPay.token.extractFormAndCreate('payment-form', success_callback, error_callback);
  });

  var success_callback = function(response) {
    if (response.data.redirect_url) {
      window.location.href = response.data.redirect_url;
    } else {
      window.location.href = 'https://www.tiendasvm.com.mx/inicio/confirmacion';
    }
  };

  var error_callback = function(response) {
    var codigo = response.data ? response.data.error_code : 'default';
    var mensaje = obtenerMensaje(codigo);
    $('#error-msg').html('⚠️ ' + mensaje).show();
    $('#pay-button').prop('disabled', false).text('🔒 PAGAR AHORA');
    setTimeout(function() {
      window.location.href = 'https://www.tiendasvm.com.mx/inicio/error-pago';
    }, 3000);
  };

});
</script>

</body>
</html>
